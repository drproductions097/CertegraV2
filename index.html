<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certegra - Tecnología con Integridad</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in { opacity: 0; }
        .animate-play { animation: fadeInUp 0.8s ease-out forwards; }
        
        .glass-badge {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Extraemos los hooks de React
        const { useEffect } = React;

        // Mock de Lucide Icons para que funcione en el navegador sin imports
        const Icon = ({ name, className }) => {
            useEffect(() => {
                lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- Componentes de apoyo ---
        const WhatsAppIcon = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
            </svg>
        );

        const GlassCard = ({ children, className = "", delay = "0" }) => (
            <div 
                className={`bg-white/10 border border-white/20 backdrop-blur-md rounded-2xl p-6 shadow-2xl transition-all duration-300 hover:bg-white/[0.15] hover:-translate-y-1 animate-fade-in ${className}`}
                style={{ animationDelay: `${delay}ms`, animationFillMode: 'both' }}
            >
                {children}
            </div>
        );

        // --- Componente Principal ---
        function App() {
            useEffect(() => {
                const observer = new IntersectionObserver(
                    (entries) => {
                        entries.forEach((entry) => {
                            if (entry.isIntersecting) {
                                entry.target.classList.add('animate-play');
                            }
                        });
                    },
                    { threshold: 0.1 }
                );
                
                document.querySelectorAll('.animate-on-scroll').forEach((el) => observer.observe(el));
                return () => observer.disconnect();
            }, []);

            return (
                <div className="min-h-screen text-slate-100 selection:bg-blue-500/30 overflow-hidden relative">
                    {/* Background */}
                    <div className="fixed inset-0 z-0 pointer-events-none">
                        <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/20 rounded-full blur-[120px]"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-800/20 rounded-full blur-[120px]"></div>
                        <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-20"></div>
                    </div>

                    <div className="relative z-10">
                        {/* NAVBAR */}
                        <nav className="container mx-auto px-6 py-6 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-2 group cursor-pointer">
                                <Icon name="cpu" className="w-8 h-8 text-blue-400 group-hover:rotate-12 transition-transform" />
                                <span className="text-2xl font-bold tracking-tight">Certegra</span>
                            </div>
                            <div className="glass-badge flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium animate-on-scroll">
                                <Icon name="map-pin" className="w-4 h-4 text-blue-400" />
                                📍 Atención en Cochabamba
                            </div>
                        </nav>

                        {/* HERO SECTION */}
                        <section className="container mx-auto px-6 min-h-[85vh] flex items-center pt-8 pb-20">
                            <div className="grid lg:grid-cols-2 gap-12 items-center">
                                <div className="space-y-8 animate-on-scroll">
                                    <h1 className="text-5xl md:text-7xl font-extrabold leading-tight">
                                        Tecnología con <span className="text-blue-400 relative inline-block">integridad.<span className="absolute bottom-2 left-0 w-full h-3 bg-blue-500/20 -z-10 rounded"></span></span>
                                    </h1>
                                    <p className="text-xl md:text-2xl text-slate-300 font-light leading-relaxed">
                                        ¿Tu computadora está lenta o calienta mucho? 🔥🐢 <br className="hidden md:block" />
                                        <span className="font-medium text-white">Diagnósticos claros. Precios justos.</span><br/>
                                        Tu equipo seguro, tu bolsillo también.
                                    </p>
                                    <div className="flex flex-col sm:flex-row gap-4 pt-4">
                                        <a href="#servicios" className="bg-blue-500 hover:bg-blue-600 text-white px-8 py-4 rounded-xl font-semibold text-lg transition-all text-center">Ver Servicios</a>
                                        <a href="https://wa.me/59179353629" className="bg-[#25D366] hover:bg-[#1DA851] text-white px-8 py-4 rounded-xl font-semibold text-lg flex items-center justify-center gap-2 transition-all">
                                            <WhatsAppIcon className="w-6 h-6" /> WhatsApp
                                        </a>
                                    </div>
                                </div>
                                <div className="relative animate-on-scroll">
                                    <div className="absolute inset-0 bg-blue-500/20 translate-x-4 translate-y-4 rounded-3xl blur-sm -z-10"></div>
                                    <img src="https://images.unsplash.com/photo-1597872200969-2b65d56bd16b?auto=format&fit=crop&q=80&w=800" className="rounded-3xl shadow-2xl object-cover w-full h-[500px] border border-white/10" />
                                </div>
                            </div>
                        </section>

                        {/* SERVICIOS */}
                        <section id="servicios" className="container mx-auto px-6 py-24">
                            <div className="text-center mb-16 animate-on-scroll">
                                <h2 className="text-4xl md:text-5xl font-bold mb-4">¿En qué te podemos ayudar? 👇</h2>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                <GlassCard delay="100"><Icon name="zap" className="w-7 h-7 text-blue-400 mb-4"/><h3 className="text-xl font-bold mb-2">Optimización</h3><p className="text-slate-300">Cambio a Windows 10 u 11 para que tu equipo trabaje al máximo.</p></GlassCard>
                                <GlassCard delay="200"><Icon name="hard-drive" className="w-7 h-7 text-blue-400 mb-4"/><h3 className="text-xl font-bold mb-2">Formateo Seguro</h3><p className="text-slate-300">Dejamos tu equipo como nuevo, cuidando tus documentos valiosos.</p></GlassCard>
                                <GlassCard delay="300"><Icon name="fan" className="w-7 h-7 text-blue-400 mb-4"/><h3 className="text-xl font-bold mb-2">Mantenimiento</h3><p className="text-slate-300">Limpieza profunda y cambio de pasta térmica.</p></GlassCard>
                            </div>
                        </section>

                        <footer className="text-center py-8 text-slate-500 border-t border-white/5">
                            <p>© {new Date().getFullYear()} Certegra. Tecnología con integridad en Cochabamba.</p>
                        </footer>
                    </div>
                </div>
            );
        }

        // Renderizar la aplicación
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
